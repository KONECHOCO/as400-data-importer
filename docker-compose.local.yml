version: '3.8'
services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db

  app:
    image: ikonet/as400importer:latest
    restart: always
    ports:
      - "127.0.0.1:8080:8003"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=as400importer_local
      - LOCAL_MODE=true
      - LICENSE_KEY=${LICENSE_KEY}
      - LICENSE_SERVER=https://as400.ikonetsolutions.com
      - JWT_SECRET=${JWT_SECRET}

volumes:
  mongo_data:
